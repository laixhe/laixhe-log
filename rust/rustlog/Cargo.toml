[package]
name = "rustlog"
version = "0.1.0"
edition = "2024"

[workspace]
# 依赖解析器版本（2024 Edition 默认使用 resolver = "3"，优化了依赖解析逻辑）
resolver = "3"
# 声明 Workspace 成员（支持通配符，如 "crates/*"）
members = [
    "learn",
    "tcpserver",
    "tcpclient",
]

# 共享依赖（推荐）：统一管理依赖版本，成员 crate 可直接引用
[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
